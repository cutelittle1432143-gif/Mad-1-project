{% extends "base.html" %}
{% block title %}Company Registration - Campus Recruitment Manager{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto mt-3">
        <h3>Company Registration</h3>
        <hr>
        <form method="POST" action="{{ url_for('register_company') }}">

            <div class="mb-3">
                <label for="name" class="form-label">Contact Person Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="hr@company.com">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <div class="mb-3">
                <label for="company_name" class="form-label">Company Name</label>
                <input type="text" class="form-control" id="company_name" name="company_name" required>
            </div>

            <div class="mb-3">
                <label for="hr_contact" class="form-label">HR Contact Number</label>
                <input type="text" class="form-control" id="hr_contact" name="hr_contact">
            </div>

            <div class="mb-3">
                <label for="website" class="form-label">Website</label>
                <input type="url" class="form-control" id="website" name="website" placeholder="https://...">
            </div>

            <button type="submit" class="btn btn-dark w-100">Register</button>
        </form>

        <hr>
        <p>Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
